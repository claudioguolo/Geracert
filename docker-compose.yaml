
services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: geracert-php:8.1
    container_name: geracert-php
    working_dir: /var/www/html/py9mt
    ports:
      - "${APP_PORT:-8085}:80"
    volumes:
      - ./:/var/www/html:Z
    environment:
      - PHP_IDE_CONFIG=serverName=geracert
    networks:
      - geracert-network
    depends_on:
      - db
    command: php -S 0.0.0.0:80 -t /var/www/html/py9mt /var/www/html/py9mt/index.php

  db:
    image: mysql:8.0
    container_name: geracert-mysql
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-geracert_dev}
      MYSQL_USER: ${MYSQL_USER:-geracert_dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_dev_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root_password}
      TZ: ${TZ:-America/Cuiaba}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - geracert-mysql:/var/lib/mysql
    networks:
      - geracert-network
    command: --default-authentication-plugin=mysql_native_password

volumes:
  geracert-mysql:

networks:
  geracert-network:
    driver: bridge
